# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
#
# Polyglot monorepo: every client lives under clients/<generator>/. Each client's
# `src/api/` is auto-generated by OpenAPI Generator (`npm run openapi:generate`) and
# must not be hand-edited, so review findings on it are not actionable here (the fix
# belongs in the spec or the generator config). Each regeneration rewrites hundreds
# of files, which also trips CodeRabbit's per-PR file limit. This mirrors the per-client
# ESLint / Prettier / coverage / cspell ignores for the same directories. Only negated
# (`!`) globs are listed, so every other path stays in scope; package-lock.json is
# already excluded by CodeRabbit's defaults.
reviews:
  path_filters:
    - '!clients/*/src/api/**'
